<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jet Lag: Tag — Zürich Edition</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
      background: #f7f7f7;
    }

    button {
      font-size: 18px;
      padding: 14px 24px;
      margin: 8px;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #333;
      background: white;
    }

    button:hover {
      background: #eeeeee;
    }

    .section {
      margin-bottom: 40px;
      padding: 24px;
      border: 1px solid #ccc;
      border-radius: 12px;
      background: white;
    }

    .result {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      background: #f1f1f1;
      text-align: left;
      font-size: 20px;
      line-height: 1.4;
    }

    .challenge-title,
    .curse-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .challenge-meta,
    .curse-meta {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .challenge-description,
    .curse-description {
      font-size: 20px;
    }

    .note {
      font-size: 16px;
      color: #555;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div class="section">
    <h1>Random Challenge</h1>
    <p>Click the button to choose a random challenge.</p>

    <button onclick="pickChallenge()">Select Challenge</button>

    <div id="challengeResult" class="result"></div>
  </div>

  <div class="section">
    <h1>Purchase a Curse</h1>
    <p>Select which category of curse you want to buy.</p>

    <button onclick="pickCurse('low')">Low Curse (50 coins)</button>
    <button onclick="pickCurse('medium')">Medium Curse (100 coins)</button>
    <button onclick="pickCurse('high')">High Curse (150 coins)</button>

    <div id="curseResult" class="result"></div>
  </div>

      },
      {

      },
      {

      },
      {

      },
      {
        name: "Lake or River View",
        difficulty: "Medium",

      },
      {

      },

      {

      },
      {
        name: "Red or Blue Vehicle",
        difficulty: "Medium Luck Challenge",
        reward: "30 or 80 coins",
        description: "Before the next train, tram, or bus arrives, choose red or blue. If the vehicle has your chosen colour clearly visible, earn 80 coins. If not, earn 30 coins. The colour can be on the front, side, doors, or advertising. Take a photo of the vehicle."
      },
      {
        name: "Bird Photo",

      },
      {
        name: "Five Unique Stations",
        difficulty: "Hard",

      },
      {

        difficulty: "Hard",

      },
      {
        name: "Three Municipalities",

        reward: "100 coins",
        description: "Visit stops or stations in 3 different towns or municipalities during the same run. Take a photo of a station or stop name in each place."
      },
      {
        name: "Transport Rainbow",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Take photos of vehicles from 4 different transport categories. Categories include train, tram, bus, boat, cable car, and funicular."
      },
      {
        name: "Countdown Challenge",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Take photos of signs showing the numbers 3, 2, and 1 in that order. The numbers can be platform numbers, bus or tram line numbers, house numbers, or other public signs."
      },
      {
        name: "Alphabet Challenge",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Take photos of station or stop names containing the letters A, E, and R. The letters can appear anywhere in the names. You may use one, two, or three station/stop names, as long as all three letters are shown."
      },
      {
        name: "High Roll Bonus",
        difficulty: "Hard Luck Challenge",
        reward: "50, 100, or 150 coins",
        description: "Roll one die. If you roll 1 or 2, earn 50 coins. If you roll 3 or 4, earn 100 coins. If you roll 5 or 6, earn 150 coins. Take a short video of the roll, or have another player witness it."
      },
      {
        name: "Risky Coin Flip",
        difficulty: "Hard Luck Challenge",
        reward: "30 or 150 coins",
        description: "Flip a coin. If it lands on heads, earn 150 coins. If it lands on tails, earn 30 coins. Take a short video of the flip, or have another player witness it."
      }
    ];

    const curses = {
      low: [
        {
          name: "Backwards Names",
          level: "Low",
          cost: "50 coins",
          description: "For the next 10 minutes, Chasers must call each other only by their names backwards. If they forget, they must stop moving for 30 seconds before continuing."
        },
        {
          name: "Wrong Hand",
          level: "Low",
          cost: "50 coins",
          description: "For the next 10 minutes, one Chaser must use their non-dominant hand whenever using their phone."
        },
        {
          name: "Photo Tax — Easy",
          level: "Low",
          cost: "50 coins",
          description: "Before the Chasers may board their next public transport vehicle, they must take a photo of one of these: a station clock, a bench, or a ticket machine."
        },
        {
          name: "Silly Walk Zone",
          level: "Low",
          cost: "50 coins",
          description: "For the next 5 minutes, Chasers must use a silly walk whenever walking outside. Normal walking is allowed inside stations, on stairs, near roads, in crowds, or anywhere silly walking would be unsafe."
        },
        {
          name: "Single File",
          level: "Low",
          cost: "50 coins",
          description: "For the next 10 minutes, Chasers must walk in single file whenever walking outside or inside a station. They do not need to walk single file on stairs, escalators, crowded platforms, near roads, or anywhere it would be unsafe."
        },
        {
          name: "Quiet Mode",
          level: "Low",
          cost: "50 coins",
          description: "For the next 10 minutes, Chasers may only speak in whispers. Normal speaking is allowed if needed for safety, directions, or talking to transport staff."
        }
      ],

      medium: [
        {
          name: "Lemon Passenger",
          level: "Medium",
          cost: "100 coins",
          description: "Before the Chasers may board their next public transport vehicle, one Chaser must have a lemon visibly on them. The lemon may be held, placed visibly in a pocket, attached to clothing, or carried in another clearly visible way. Once the lemon is visible, they may use public transport again. The lemon must stay visible for 15 minutes."
        },
        {
          name: "Silent Chasers",
          level: "Medium",
          cost: "100 coins",
          description: "For the next 10 minutes, Chasers may not speak, whisper, or message each other. They may only communicate by gestures. Speaking is allowed only for safety, directions, or talking to transport staff."
        },
        {
          name: "Freeze Roll — Medium",
          level: "Medium",
          cost: "100 coins",
          description: "Roll one die. The Chasers are frozen exactly where they are for 1 × the number rolled minutes. For example, a roll of 4 means they are frozen for 4 minutes. During the freeze, they may not move, walk, board public transport, get off public transport, or change platforms. They may use their phones. If they are already on public transport, they must stay on that vehicle until the freeze time ends. If the vehicle reaches the end of the line before the freeze ends, they must get off at the final stop and remain frozen there until the time is over."
        },
        {
          name: "Photo Tax — Medium",
          level: "Medium",
          cost: "100 coins",
          description: "Before the Chasers may board their next public transport vehicle, they must photograph all three: a station clock, a bench, and a ticket machine."
        },
        {
          name: "No Maps",
          level: "Medium",
          cost: "100 coins",
          description: "For the next 10 minutes, Chasers may not use map apps, route-planning apps, or live navigation. They may use station signs, departure boards, printed maps, and memory."
        },
        {
          name: "One Vehicle Wait",
          level: "Medium",
          cost: "100 coins",
          description: "The Chasers must let the next usable public transport vehicle depart without boarding it. After it leaves, they may continue normally."

      ],

        {
          name: "Freeze Roll — High",
          level: "High",
          cost: "150 coins",

        },
        {
          name: "One-Stop Penalty",
          level: "High",
          cost: "150 coins",
          description: "On their next public transport ride, the Chasers must get off after exactly one stop, wait 3 minutes, and then continue."

    function pickChallenge() {
      const randomIndex = Math.floor(Math.random() * challenges.length);
      const selectedChallenge = challenges[randomIndex];

      document.getElementById("challengeResult").innerHTML = `
        <div class="challenge-title">${selectedChallenge.name}</div>
        <div class="challenge-meta">${selectedChallenge.difficulty} — ${selectedChallenge.reward}</div>
        <div class="challenge-description">${selectedChallenge.description}</div>
        <div class="note">Remember: you may only have one active challenge at a time. If you cannot complete this challenge, it counts as failed and you are frozen for 15 minutes.</div>
      `;
    }

    function pickCurse(category) {
      const items = curses[category];

      if (!items) {
        document.getElementById("curseResult").textContent = "Invalid category.";
        return;
      }

      const randomIndex = Math.floor(Math.random() * items.length);
      const selectedCurse = items[randomIndex];

      document.getElementById("curseResult").innerHTML = `
        <div class="curse-title">${selectedCurse.name}</div>
        <div class="curse-meta">${selectedCurse.level} Curse — ${selectedCurse.cost}</div>
        <div class="curse-description">${selectedCurse.description}</div>
        <div class="note">The Runner must pay for this curse immediately. If the Runner does not have enough coins, the curse cannot be bought.</div>
      `;
    }
  </script>
</body>
</html>
