<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jet Lag: Tag — Zürich Edition</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
      background: #f7f7f7;
    }

    button {
      font-size: 18px;
      padding: 14px 24px;
      margin: 8px;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #333;
      background: white;
    }

    button:hover {
      background: #eeeeee;
    }

    .section {
      margin-bottom: 40px;
      padding: 24px;
      border: 1px solid #ccc;
      border-radius: 12px;
      background: white;
    }

    .result {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      background: #f1f1f1;
      text-align: left;
      font-size: 20px;
      line-height: 1.4;
    }

    .challenge-title,
    .curse-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .challenge-meta {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .challenge-description,
    .curse-description {
      font-size: 20px;
    }

    .note {
      font-size: 16px;
      color: #555;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div class="section">
    <h1>Random Challenge</h1>
    <p>Click the button to choose a random challenge.</p>

    <button onclick="pickChallenge()">Select Challenge</button>

    <div id="challengeResult" class="result"></div>
  </div>

  <div class="section">
    <h1>Purchase a Curse</h1>
    <p>Select which category of curse you want to buy.</p>

    <button onclick="pickCurse('low')">Low Curse (50 coins)</button>
    <button onclick="pickCurse('medium')">Medium Curse (100 coins)</button>
    <button onclick="pickCurse('high')">High Curse (150 coins)</button>

    <div id="curseResult" class="result"></div>
  </div>

  <script>
    const challenges = [
      {
        name: "Station Clock Selfie",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a selfie with a station clock. The clock must be clearly visible in the photo."
      },
      {
        name: "Fountain Finder",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo of a public fountain. The fountain must be outside or in a publicly accessible place."
      },
      {
        name: "Bus Stop Spotter",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo of a bus stop sign. The sign must show the stop name or bus symbol clearly."
      },
      {
        name: "Two-Platform Station",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo proving you are at a station with at least 2 platforms. The photo must show platform numbers, tracks, or signs clearly enough to verify this."
      },
      {
        name: "Bike Rack",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo of a bicycle rack. At least one bicycle rack must be clearly visible."
      },
      {
        name: "Public Bench",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo of a public bench. The bench must be in a public place, such as a station, park, street, square, or bus/tram stop."
      },
      {
        name: "Station Shop",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo of a shop, kiosk, bakery, café, or takeaway place inside a station or directly beside a station."
      },
      {
        name: "Church Steeple",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo of a church steeple. The steeple must be clearly visible."
      },
      {
        name: "Ticket Machine Selfie",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a selfie with a public transport ticket machine. The ticket machine must be clearly visible."
      },
      {
        name: "Red Train",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo of a train with red clearly visible on the front, side, or engine."
      },
      {
        name: "Station Name Sign",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo of a station or stop name sign. The name must be readable in the photo."
      },
      {
        name: "Public Map",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo of a public map, transport map, hiking map, local area map, or station map."
      },
      {
        name: "Bridge Photo",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo from, under, on, or beside a bridge. The bridge must be clearly visible."
      },
      {
        name: "Yellow Postbox",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo of a Swiss yellow postbox."
      },
      {
        name: "Platform Number",
        difficulty: "Easy",
        reward: "30 coins",
        description: "Take a photo clearly showing a platform number at a train, tram, or bus stop."
      },
      {
        name: "Coin Flip — Easy",
        difficulty: "Easy Luck Challenge",
        reward: "20 or 50 coins",
        description: "Flip a coin. If it lands on heads, earn 50 coins. If it lands on tails, earn 20 coins. Take a short video of the flip, or have another player witness it."
      },
      {
        name: "Four-Platform Station",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Take a photo proving you are at a station with at least 4 platforms. Platform signs, track numbers, or a station map must make this clear."
      },
      {
        name: "Departure Board Problem",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Take a photo of a public transport departure board showing a delay, cancellation, platform change, or other travel warning."
      },
      {
        name: "Lake or River View",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Take a photo of a lake or river. The water must be clearly visible."
      },
      {
        name: "Three Station Names",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Take photos of 3 different station or stop name signs. All 3 names must be readable."
      },
      {
        name: "Exactly Three Stops",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Ride a tram or bus for exactly 3 stops. Take a photo at the stop where you get off, showing the stop name."
      },
      {
        name: "Same First Letter",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Visit two different stations or stops whose names start with the same letter. Take a photo of both station or stop name signs."
      },
      {
        name: "Long Train",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Take a photo of a train with at least 8 carriages. The photo must show enough of the train to make the length believable."
      },
      {
        name: "Three Transport Types",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Take photos of 3 different allowed transport types in the ZVV network. Examples: train, tram, bus, boat, cable car, or funicular."
      },
      {
        name: "Cross Water",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Take a photo while crossing a river, lake, canal, or stream by bridge, boat, train, tram, or bus."
      },
      {
        name: "Line Trio",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Visit 3 different stops or stations on the same transport line. Take a photo of the stop or station name at each one."
      },
      {
        name: "ZVV Symbol",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Take a photo clearly showing a ZVV logo, ZVV zone map, or official ZVV information sign."
      },
      {
        name: "Public Art",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Take a photo of public art, a statue, mural, sculpture, or similar outdoor artwork. A normal fountain does not count for this challenge."
      },
      {
        name: "Luxury Car Spotting",
        difficulty: "Medium",
        reward: "60 coins",
        description: "Take a photo of a car that ChatGPT estimates would cost at least 100,000 CHF new. The brand and model must be visible or clearly identifiable. If ChatGPT says it is unclear, the challenge does not count."
      },
      {
        name: "Red or Blue Vehicle",
        difficulty: "Medium Luck Challenge",
        reward: "30 or 80 coins",
        description: "Before the next train, tram, or bus arrives, choose red or blue. If the vehicle has your chosen colour clearly visible, earn 80 coins. If not, earn 30 coins. The colour can be on the front, side, doors, or advertising. Take a photo of the vehicle."
      },
      {
        name: "Bird Photo",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Take a photo of a real bird. The bird must be visible in the photo. Bird statues, drawings, logos, or signs do not count."
      },
      {
        name: "Train, Tram, and Bus",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Ride a train, a tram, and a bus during the same run. Take a photo proving each transport type."
      },
      {
        name: "No Repeated Line",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Visit 3 different stations or stops without using the same transport line twice. Take a photo at each stop or station."
      },
      {
        name: "Four Transport Lines",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Use 4 different public transport lines during the same run. Take a photo or screenshot proving each line."
      },
      {
        name: "Six Stops Without Getting Off",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Travel through 6 consecutive stops or stations without leaving the vehicle. Take a photo when you get on and another photo when you get off."
      },
      {
        name: "Five-in-One Photo Set",
        difficulty: "Hard",
        reward: "100 coins",
        description: "During the same run, take photos of all five of these things: a train, a tram, a bus, a body of water, and a church."
      },
      {
        name: "Five Unique Stations",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Visit 5 unique stations or stops during the same run. Take a photo of each station or stop name."
      },
      {
        name: "End of the Line",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Reach a station or stop at the end of a train, tram, bus, boat, cable car, or funicular line. Take a photo of the station or stop name and a departure board or route sign showing it is the end of the line."
      },
      {
        name: "Three Municipalities",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Visit stops or stations in 3 different towns or municipalities during the same run. Take a photo of a station or stop name in each place."
      },
      {
        name: "Transport Rainbow",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Take photos of vehicles from 4 different transport categories. Categories include train, tram, bus, boat, cable car, and funicular."
      },
      {
        name: "Countdown Challenge",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Take photos of signs showing the numbers 3, 2, and 1 in that order. The numbers can be platform numbers, bus or tram line numbers, house numbers, or other public signs."
      },
      {
        name: "Alphabet Challenge",
        difficulty: "Hard",
        reward: "100 coins",
        description: "Take photos of station or stop names containing the letters A, E, and R. The letters can appear anywhere in the names. You may use one, two, or three station/stop names, as long as all three letters are shown."
      },
      {
        name: "High Roll Bonus",
        difficulty: "Hard Luck Challenge",
        reward: "50, 100, or 150 coins",
        description: "Roll one die. If you roll 1 or 2, earn 50 coins. If you roll 3 or 4, earn 100 coins. If you roll 5 or 6, earn 150 coins. Take a short video of the roll, or have another player witness it."
      },
      {
        name: "Risky Coin Flip",
        difficulty: "Hard Luck Challenge",
        reward: "30 or 150 coins",
        description: "Flip a coin. If it lands on heads, earn 150 coins. If it lands on tails, earn 30 coins. Take a short video of the flip, or have another player witness it."
      }
    ];

    const curses = {
      low: [
        "Low Item 1",
        "Low Item 2",
        "Low Item 3",
        "Low Item 4",
        "Low Item 5",
        "Low Item 6"
      ],
      medium: [
        "Medium Item 1",
        "Medium Item 2",
        "Medium Item 3",
        "Medium Item 4",
        "Medium Item 5",
        "Medium Item 6"
      ],
      high: [
        "High Item 1",
        "High Item 2",
        "High Item 3",
        "High Item 4",
        "High Item 5",
        "High Item 6"
      ]
    };

    function pickChallenge() {
      const randomIndex = Math.floor(Math.random() * challenges.length);
      const selectedChallenge = challenges[randomIndex];

      document.getElementById("challengeResult").innerHTML = `
        <div class="challenge-title">${selectedChallenge.name}</div>
        <div class="challenge-meta">${selectedChallenge.difficulty} — ${selectedChallenge.reward}</div>
        <div class="challenge-description">${selectedChallenge.description}</div>
        <div class="note">Remember: you may only have one active challenge at a time. If you cannot complete this challenge, it counts as failed and you are frozen for 15 minutes.</div>
      `;
    }

    function pickCurse(category) {
      const items = curses[category];

      if (!items) {
        document.getElementById("curseResult").textContent = "Invalid category.";
        return;
      }

      const randomIndex = Math.floor(Math.random() * items.length);
      const selectedCurse = items[randomIndex];

      document.getElementById("curseResult").innerHTML = `
        <div class="curse-title">${selectedCurse}</div>
      `;
    }
  </script>
</body>
</html>
