<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Picker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
      text-align: center;
    }

    button {
      font-size: 18px;
      padding: 14px 24px;
      margin: 8px;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .section {
      margin-bottom: 50px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 12px;
    }

    .result {
      margin-top: 30px;
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="section">
    <h1>Random Challenge</h1>
    <p>Click the button to choose a random challenge.</p>

    <button onclick="pickChallenge()">New Challenge</button>

    <div id="challengeResult" class="result"></div>
  </div>

  <div class="section">
    <h1>Purchase a curse!</h1>
    <p>Select which category of curses you want to buy.</p>

    <button onclick="pickCurse('low')">Lowest (25 coins)</button>
    <button onclick="pickCurse('medium')">Medium (50 coins)</button>
    <button onclick="pickCurse('high')">Highest (75 coins)</button>

    <div id="curseResult" class="result"></div>
  </div>

  <script>
    const challenges = [
      "10 Coin Challenge",
      "20 Coin Challenge",
      "30 Coin Challenge"
    ];

    const curses = {
      low: [
        "Low Item 1",
        "Low Item 2",
        "Low Item 3",
        "Low Item 4",
        "Low Item 5",
        "Low Item 6"
      ],
      medium: [
        "Medium Item 1",
        "Medium Item 2",
        "Medium Item 3",
        "Medium Item 4",
        "Medium Item 5",
        "Medium Item 6"
      ],
      high: [
        "High Item 1",
        "High Item 2",
        "High Item 3",
        "High Item 4",
        "High Item 5",
        "High Item 6"
      ]
    };

    function pickChallenge() {
      const randomIndex = Math.floor(Math.random() * challenges.length);
      const selectedChallenge = challenges[randomIndex];

      document.getElementById("challengeResult").textContent = selectedChallenge;
    }

    function pickCurse(category) {
      const items = curses[category];

      if (!items) {
        document.getElementById("curseResult").textContent = "Invalid category.";
        return;
      }

      const randomIndex = Math.floor(Math.random() * items.length);
      const selectedCurse = items[randomIndex];

      document.getElementById("curseResult").textContent = selectedCurse;
    }
  </script>
</body>
</html>
